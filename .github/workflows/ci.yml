name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The full acceptance test (two live peers, delegation, kill + refund),
  # with peer B executing the task on a real local LLM through the api
  # harness (openai flavor): llama.cpp serving Qwen2.5-0.5B on CPU.
  # No cloud provider or API credentials are involved.
  acceptance-local-llm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .
      - name: Byte-compile all modules
        run: python -m compileall agenttorrent acceptance_test.py
      - name: Cache model download
        uses: actions/cache@v4
        with:
          path: ~/.cache/llama.cpp
          key: gguf-qwen2.5-0.5b-instruct-q4_k_m
      - name: Install llama.cpp server (prebuilt release)
        run: |
          set -euo pipefail
          curl -fsSL -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/ggml-org/llama.cpp/releases?per_page=10" > releases.json
          url=$(python3 - <<'EOF'
          import json, sys

          releases = json.load(open("releases.json"))
          other_platform = ("arm", "s390x", "riscv", "ppc", "win", "macos")
          # Accelerated variants need their runtime (or, like OpenVINO, have
          # crashed on plain CPU runners) — only used if no plain build exists.
          accelerated = ("vulkan", "cuda", "hip", "sycl", "musa", "rocm", "openvino")
          for rel in releases:
              candidates = [
                  a for a in rel.get("assets", [])
                  if "ubuntu" in a["name"].lower()
                  and ("x64" in a["name"].lower() or "amd64" in a["name"].lower())
                  and a["name"].lower().endswith((".zip", ".tar.gz"))
                  and not any(k in a["name"].lower() for k in other_platform)
              ]
              plain = [a for a in candidates
                       if not any(k in a["name"].lower() for k in accelerated)]
              if plain or candidates:
                  pick = (plain or candidates)[0]
                  print(f"picked {pick['name']} from {rel.get('tag_name')}", file=sys.stderr)
                  print(pick["browser_download_url"])
                  sys.exit(0)
          recent = [a["name"] for rel in releases[:3] for a in rel.get("assets", [])]
          sys.exit(f"no ubuntu x64 asset found; recent assets: {recent}")
          EOF
          )
          echo "downloading $url"
          curl -fsSL -o llama-archive "$url"
          mkdir -p llama-cpp
          case "$url" in
            *.zip) unzip -q llama-archive -d llama-cpp ;;
            *) tar -xzf llama-archive -C llama-cpp ;;
          esac
          find llama-cpp -name llama-server -type f
      - name: Start llama-server with Qwen2.5-0.5B-Instruct
        run: |
          set -euo pipefail
          bin_dir=$(dirname "$(find llama-cpp -name llama-server -type f | head -1)")
          LD_LIBRARY_PATH="$bin_dir" "$bin_dir/llama-server" \
            -hf Qwen/Qwen2.5-0.5B-Instruct-GGUF:q4_k_m \
            --port 8080 --temp 0 > llama-server.log 2>&1 &
          for _ in $(seq 1 120); do
            curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "llama-server never became healthy" >&2
          tail -50 llama-server.log >&2
          exit 1
      - name: Run acceptance test (peer B executes on the local LLM)
        env:
          # Placeholder key — llama-server doesn't check auth; its presence is
          # what makes the worker advertise the `api` harness.
          ANTHROPIC_API_KEY: local
          ANTHROPIC_BASE_URL: http://127.0.0.1:8080
          AGENTTORRENT_API_FLAVOR: openai
        run: python acceptance_test.py
      - name: Dump llama-server log on failure
        if: failure()
        run: tail -100 llama-server.log || true
