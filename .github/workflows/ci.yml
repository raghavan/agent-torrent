name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .
      - name: Byte-compile all modules
        run: python -m compileall agenttorrent acceptance_test.py
      - name: Run acceptance test (two live peers, delegation, kill + refund)
        run: python acceptance_test.py
